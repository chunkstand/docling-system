    exceptions:
      - exception_id: db-model-contract-domain-manifest-aggregation
        case_id: IC-5F0E1C8B0D42
        owner_module: tests/db_model_contract_domains/
        follow_up_condition: Keep the residual file limited to domain manifest
          imports plus aggregate constant and contract maps.
        match_tokens:
          - '    "ingest": _ingest.MODEL_SYMBOLS,'
          - '    **_ingest.REQUIRED_TABLE_INDEX_NAMES,'
  tests/unit/test_agent_task_context.py:
