schema_name: hotspot_prevention_policy
schema_version: "1.0"
known_hotspots:
  app/db/models.py:
    target_role: compatibility facade for ORM models
    preferred_owner_modules:
      - app/db/model_domains/
    block_new:
      - orm_class
      - enum
      - relationship_logic
      - broad_helper
    allow:
      - import_forwarder
      - alias_forwarder
      - table_metadata_alignment
      - deletion
  app/services/evidence.py:
    target_role: compatibility facade for evidence capabilities
    preferred_owner_modules:
      - app/services/evidence_*.py
    block_new:
      - private_helper
      - payload_builder
      - persistence_logic
      - artifact_assembly
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
    exceptions:
      - exception_id: evidence-facade-settings-aware-provenance-wrappers
        case_id: IC-050E60059A34
        owner_module: app/services/evidence_provenance.py
        follow_up_condition: Keep app/services/evidence.py limited to settings-aware compatibility wrappers that depend on app.services.evidence.get_settings.
        match_tokens:
          - _prov_export_receipt_signature
          - _prov_export_receipt(
          - _frozen_prov_export_payload
          - _prov_export_receipt_integrity
          - settings_provider=get_settings
  app/services/evidence_provenance_exports.py:
    target_role: provenance-export compatibility facade
    preferred_owner_modules:
      - app/services/evidence_provenance_export_graph_core.py
      - app/services/evidence_provenance_export_graph_report.py
      - app/services/evidence_provenance_export_lifecycle.py
    block_new:
      - provenance_graph_logic
      - report_trace_lineage_logic
      - export_lifecycle_logic
      - governance_change_impact_logic
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  app/cli.py:
    target_role: console script compatibility and dispatch surface
    preferred_owner_modules:
      - app/cli_commands/
    block_new:
      - command_implementation
      - broad_parser_logic
      - session_or_storage_wiring
      - json_render_or_parser_body_scaffolding
    allow:
      - explicit_forwarding_function
      - parser_registration
      - import_forwarder
      - deletion
  app/services/agent_task_actions.py:
    target_role: action registry compatibility and execution entrypoint
    preferred_owner_modules:
      - app/services/agent_actions/
    block_new:
      - executor_implementation
      - action_family_helper
      - schema_builder
    allow:
      - registry_composition
      - import_forwarder
      - alias_forwarder
      - deletion
  app/services/agent_task_context.py:
    target_role: context builder lookup and context artifact entrypoint
    preferred_owner_modules:
      - app/services/agent_task_context_*.py
    block_new:
      - context_builder_implementation
      - context_family_helper
    allow:
      - registry_composition
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  app/services/search.py:
    target_role: search service compatibility facade
    preferred_owner_modules:
      - app/services/search_*.py
    block_new:
      - ranking_logic
      - query_feature_helper
      - execution_orchestration
      - candidate_loading
      - search_detail_payload_builder
      - hydration_logic
      - persistence_logic
      - operator_trace_payload_builder
      - telemetry_payload_builder
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  app/services/semantics.py:
    target_role: semantic service compatibility facade
    preferred_owner_modules:
      - app/services/semantic_pass_lifecycle.py
      - app/services/semantic_pass_reads.py
      - app/services/semantic_registry_preview.py
    block_new:
      - semantic_pass_lifecycle_logic
      - projection_refresh_review_logic
      - active_pass_read_logic
      - registry_preview_expectation_logic
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  app/services/claim_support_policy_impacts.py:
    target_role: claim-support policy impact compatibility facade
    preferred_owner_modules:
      - app/services/claim_support_policy_impact_*.py
    block_new:
      - read_model_worklist_logic
      - alert_projection_or_escalation_logic
      - replay_lifecycle_logic
      - replay_closure_receipt_logic
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  app/services/evaluations.py:
    target_role: evaluation service compatibility facade
    preferred_owner_modules:
      - app/services/evaluation_*.py
    block_new:
      - fixture_corpus_logic
      - scoring_logic
      - structural_check_logic
      - latest_read_logic
    allow:
      - import_forwarder
      - alias_forwarder
      - explicit_forwarding_function
      - deletion
  tests/unit/test_cli.py:
    target_role: legacy CLI compatibility tests
    preferred_owner_modules:
      - tests/unit/test_cli_*.py
    block_new:
      - broad_new_test_group
    allow:
      - compatibility_assertion
      - deletion
