        - docs/db_models_compatibility_facade_milestone_plan.md
        - docs/db_models_residual_owner_family_milestone_plan.md
    block_new:
      - orm_class
      - enum
      - relationship_logic
      - broad_helper
    allow:
      - import_forwarder
      - alias_forwarder
      - table_metadata_alignment
      - deletion
