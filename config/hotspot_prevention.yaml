        owner_module: tests/unit/test_agent_task_context_*.py
        follow_up_condition: Keep the residual file limited to registry and
          compatibility checks plus the local fake session scaffold they require.
        match_tokens:
          - class FakeScalarResult:
          - def test_context_builder_registry_is_composed_from_owner_modules() -> None:
