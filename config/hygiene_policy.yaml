duplicate_helper_names:
  - name: _foreign_results_before_first_expected_hit
    modules:
      - app/services/evaluations.py
      - app/services/search_replays.py
    reason: Evaluation and replay services compute the same concept over different result payloads.
  - name: _extractor_descriptor
    modules:
      - app/services/semantic_candidates.py
      - app/services/semantic_graph.py
    reason: Candidate and graph semantic workflows describe extractor contracts at separate boundaries.
  - name: _file_sha256
    modules:
      - app/services/ingest_batches.py
      - app/services/validation.py
    reason: Batch ingest and PDF validation hash different file lifecycle inputs.
  - name: _latest_evaluations_by_run
    modules:
      - app/services/audit.py
      - app/services/quality.py
    reason: Audit and quality keep separate in-memory projections of evaluation rows.
  - name: _load_replay_run
    modules:
      - app/services/search_release_gate.py
      - app/services/search_replays.py
    reason: Release gating and replay inspection resolve different replay run shapes.
  - name: _load_target_documents
    modules:
      - app/services/semantic_bootstrap.py
      - app/services/semantic_candidates.py
    reason: Bootstrap and candidate workflows load target documents for different semantic stages.
  - name: _matching_rank
    modules:
      - app/services/evaluations.py
      - app/services/search_replays.py
    reason: Evaluation and replay comparisons calculate rank over different case types.
  - name: _normalize_text
    modules:
      - app/services/docling_parser.py
      - app/services/search.py
    reason: Parser normalization and retrieval normalization are intentionally different.
  - name: _page_label
    modules:
      - app/services/chat.py
      - app/services/semantic_generation.py
    reason: Chat citations and semantic generation render page labels in separate response models.
  - name: _payload_fingerprint
    modules:
      - app/services/eval_workbench.py
      - app/services/search_legibility.py
    reason: Eval workbench and search legibility hash payloads for separate operator contracts.
  - name: _payload_sha256
    modules:
      - app/services/agent_task_context_store.py
      - app/services/technical_reports.py
    reason: Agent context and technical report workflows hash different artifact payload boundaries.
  - name: _rank_metrics
    modules:
      - app/services/search_harness_evaluations.py
      - app/services/search_release_gate.py
    reason: Harness evaluation and release gating compute rank metrics for separate gate surfaces.
  - name: _reciprocal_rank
    modules:
      - app/services/evaluations.py
      - app/services/search.py
    reason: Evaluation scoring and live-search scoring own separate ranking math surfaces.
  - name: _result_label
    modules:
      - app/services/chat.py
      - app/services/search.py
    reason: Chat citations and search results render different UI labels.
  - name: _review_rank
    modules:
      - app/services/semantic_facts.py
      - app/services/semantic_graph.py
      - app/services/semantic_orchestration.py
    reason: Semantic facts, graph memory, and orchestration rank review states in different row shapes.
  - name: _support_level
    modules:
      - app/services/semantic_generation.py
      - app/services/semantic_graph.py
    reason: Generation and graph verification compute support labels over different evidence structures.
  - name: _to_evaluation_summary
    modules:
      - app/services/evaluations.py
      - app/services/search_harness_evaluations.py
    reason: Document evaluations and harness evaluations summarize different result schemas.
  - name: _top_n_source_hit_count
    modules:
      - app/services/evaluations.py
      - app/services/search_replays.py
    reason: Evaluation and replay services count expected-document hits in different result models.
  - name: _unique_uuids
    modules:
      - app/services/semantic_generation.py
      - app/services/technical_reports.py
    reason: Generation and report workflows dedupe UUID lists at separate contract boundaries.
  - name: _write_failure_artifact
    modules:
      - app/services/agent_task_worker.py
      - app/services/runs.py
    reason: Run failures and agent-task failures serialize different artifact schemas.
duplicate_helper_bodies:
  - helpers:
      - app/services/agent_task_context_store.py:_payload_sha256
      - app/services/eval_workbench.py:_payload_fingerprint
      - app/services/search_legibility.py:_payload_fingerprint
      - app/services/technical_reports.py:_payload_sha256
    reason: Payload hash helpers intentionally repeat the same stable JSON hashing contract at artifact boundaries.
  - helpers:
      - app/services/chat.py:_page_label
      - app/services/semantic_generation.py:_page_label
    reason: Page-label formatting is duplicated for separate response models until a UI formatting module exists.
  - helpers:
      - app/services/semantic_facts.py:_review_rank
      - app/services/semantic_graph.py:_review_rank
    reason: Fact and graph services rank semantic review status in different persistence workflows.
