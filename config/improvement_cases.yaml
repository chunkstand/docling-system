- case_id: IC-F2A8110185EB
  title: 'Architecture hotspot: app/db/models.py'
  status: deployed
  cause_class: unclear_ownership
  observed_failure: app/db/models.py previously mixed enum ownership, delayed
    import bootstrapping, and import-forwarder aliases inside the public
    compatibility facade.
  source:
    source_type: architecture_governance
    source_ref: architecture-quality:hotspot:app/db/models.py
    notes: report_path=/Users/chunkstand/Documents/docling-system/build/architecture-governance/architecture_quality_report.json;
      artifact_target_path=app/db/models.py; verification_command=uv run docling-system-architecture-quality-report;
      stop_condition=Hotspot risk decreases or the surface has a narrower owner contract.
  artifact:
    artifact_type: contract
    target_path: app/db/models.py
    description: Architecture quality owner surface for app/db/models.py.
  verification:
    commands:
    - git diff --check
    - uv run ruff check app tests
    - uv run pytest -q tests/unit/test_db_model_import_compatibility.py
    - uv run pytest -q tests/unit/test_db_models_facade_contract.py
    - DOCLING_SYSTEM_RUN_INTEGRATION=1 uv run pytest -q -rs tests/integration/test_db_model_metadata.py
    - uv run --extra dev alembic heads
    - uv run --extra dev alembic current
    - uv run --extra dev alembic upgrade head
    - uv run --extra dev alembic check
    - DOCLING_SYSTEM_RUN_INTEGRATION=1 uv run pytest -q -rs
    - uv run docling-system-architecture-quality-report
    acceptance_conditions:
    - app/db/models.py is reduced to a pure compatibility facade with no
      in-file enum ownership or ORM definitions.
    - The public app.db.models import surface remains import-compatible for all
      governed symbols.
    catches_old_failure: true
    allows_good_changes: true
  workflow_version: improvement_v1
  deployment:
    deployed_ref: "8340dc0"
    notes: >-
      Milestone 2 moves the remaining enum ownership into
      app/db/_model_enums.py, reduces app/db/models.py to a pure
      compatibility facade, and adds a gate that prevents the private enum
      support module from becoming a second public import surface. The
      architecture-quality report may still route app/db/models.py because of
      its intentional public fan-in, but the unclear_ownership owner case is
      now resolved under the explicit compatibility contract. Local closeout
      commit: 8340dc0.
  measurement:
    metric_name: db_models_hotspot_line_count
    current_value: 159.0
    measurement_window: 2026-05-11 local verification
    notes: >-
      Milestone 2 moved the remaining enum ownership into app/db/_model_enums.py
      and reduced app/db/models.py from 345 lines to 159 while preserving the
      governed 111-symbol app.db.models public export contract.
  created_at: '2026-05-10T01:15:27.810985+00:00'
  updated_at: '2026-05-11T23:35:00+00:00'
