- case_id: IC-6C1B516A3F92
  title: 'Hygiene budget hotspot: app/hotspot_prevention_classifier.py'
  status: open
  cause_class: unclear_ownership
  observed_failure: app/hotspot_prevention_classifier.py exceeds the default
    file budget at 1002 lines after the semantics, CLI, agent-task schema,
    oversized-test, and search-facade governance ratchets expanded the hotspot-prevention
    classifier rules again.
  source:
    source_type: hygiene_finding
    source_ref: hygiene:file-budget:app/hotspot_prevention_classifier.py
    notes: Refreshed while re-running the search compatibility-facade closeout
      verification after tightening the search compatibility-facade hotspot gate.
  artifact:
    artifact_type: contract
    target_path: app/hotspot_prevention_classifier.py
    description: Hotspot prevention classifier budget follow-on after the
      search persistence/operator-trace gate hardening.
  verification:
    commands:
    - uv run ruff check app/hotspot_prevention_classifier.py
      tests/unit/test_hotspot_prevention.py
    - uv run pytest -q tests/unit/test_hotspot_prevention.py
    - uv run docling-system-hotspot-prevention-check --strict
    - uv run docling-system-hygiene-check
    acceptance_conditions:
    - app/hotspot_prevention_classifier.py is reduced back under the 600-line
      default budget or split into smaller helpers without changing classifier
      behavior.
    - Hotspot prevention fixture coverage remains green for registry
      composition and strict blocking behavior.
    catches_old_failure: true
    allows_good_changes: true
  workflow_version: improvement_v1
  deployment:
    deployed_ref: "efe6d4e"
    notes: Residual ratchet increase was first recorded in the search execution
      persistence closeout commit f55b474 and refreshed during the local
      provenance-export closeout after adding the dedicated
      evidence_provenance_exports hotspot classifier rules. The semantics
      service-boundary closeout expanded the classifier again to cover
      semantic lifecycle, review, read, and registry-preview regrowth in
      app/services/semantics.py. The CLI Milestone 1 facade-prevention ratchet
      expanded the classifier again to block direct session or storage wiring
      plus parser-body or JSON-render scaffolding in app/cli.py. The local
      agent-task schema closeout extends that rule set again so the classifier
      also allows only the compact registry-backed __getattr__/__dir__
      compatibility facade used by app/schemas/agent_tasks.py while still
      blocking new schema definitions, broad re-export batches, and
      export-sink surfaces. The oversized-test closeout then moved shared
      rule-classification helpers into app/hotspot_prevention_classifier_support.py
      and reduced the primary classifier back to 960 lines. The search
      compatibility-facade closeout then extended the classifier again to
      block harness-registry, retrieval-primitive, and metadata-supplement
      regrowth in app/services/search.py. The hygiene follow-on remains open.
  measurement:
    metric_name: hotspot_prevention_classifier_line_count
    current_value: 1002.0
    measurement_window: 2026-05-14 search compatibility-facade closeout
    notes: The classifier still carries the earlier registry-composition and
      search-boundary allowances and now also blocks provenance-graph,
      report-lineage, lifecycle, and governance-change-impact growth in
      app/services/evidence_provenance_exports.py plus semantic pass
      lifecycle, review persistence, active-pass read, registry-preview
      regrowth in app/services/semantics.py, direct session or storage wiring
      plus parser-body or JSON-render scaffolding in app/cli.py, and the
      compact agent-task schema compatibility-facade hooks for
      app/schemas/agent_tasks.py. The oversized-test closeout extracted common
      hunk and support logic into app/hotspot_prevention_classifier_support.py,
      and the search compatibility-facade closeout added direct blocking rules
      for harness-registry, retrieval-primitive, and metadata-supplement
      regrowth in app/services/search.py, leaving the primary classifier at
      1002 lines.
  created_at: '2026-05-13T00:00:00+00:00'
  updated_at: '2026-05-15T05:27:55Z'
